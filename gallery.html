<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bildgalleri - Powell & Moa</title>

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <!-- CSS Files -->
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/gallery.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header>
      <div class="header-container">
        <div class="logo">P & M</div>

        <nav class="desktop-nav">
          <a href="index.html">Hem</a>
          <a href="schedule.html">Schema</a>
          <a href="gallery.html">Bildgalleri</a>
          <a href="practical.html">Praktiskt</a>
        </nav>

        <button id="menuBtn" class="menu-btn">☰</button>
        <a href="rsvp.html" class="btn-rsvp hidden-mobile">OSA</a>
      </div>

      <nav id="mobileNav" class="mobile-nav">
        <a href="index.html">Hem</a>
        <a href="schedule.html">Schema</a>
        <a href="gallery.html">Bildgalleri</a>
        <a href="practical.html">Praktiskt</a>
        <a href="rsvp.html" class="btn-rsvp" style="display: block !important; margin-top: 0.5rem">OSA</a>
      </nav>
    </header>

    <main>
      <!-- GALLERY SECTION -->
      <section class="gallery-section fade-in">
        <div class="container">
          <div class="gallery-header">
            <p class="gallery-label">Galleri</p>
            <h1 class="gallery-header h2" style="font-family: 'Playfair Display', serif; font-size: 2.25rem; margin: 0.75rem 0 0">
              Våra ögonblick
            </h1>
            <p class="gallery-description">Text</p>
          </div>

          <div id="galleryGrid" class="gallery-grid">
            <!-- Bilder läggs till här av gallery.js -->
          </div>

          <!-- UPLOAD SECTION -->
          <div class="upload-section">
            <h2 style="font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 1.5rem">
              Dela dina bilder
            </h2>
            <div id="uploadArea" class="upload-area">
              
              <p><strong>Klicka eller dra och släpp bilder här</strong></p>
              <p style="opacity: 0.6">Stöds: JPG, PNG, WebP </p>
              <input type="file" multiple accept="image/*" />
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- FOOTER -->
    <footer>Powell & Moa · 2027</footer>

    <!-- JavaScript -->
    <script src="js/app.js"></script>
    <script src="js/gallery.js"></script>
    <script src="js/upload.js"></script>
  </body>
</html>
