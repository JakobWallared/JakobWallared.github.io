<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wedding Website</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: #f7f2ef;
        color: #333;
      }
      header {
        background: #7c5b4f;
        color: #fff;
        padding: 15px 20px;
        text-align: center;
      }
      section {
        max-width: 900px;
        margin: 30px auto;
        padding: 0 20px;
      }
      .hero {
        background: #fff;
        border-radius: 12px;
        padding: 30px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
      }
      .hero h1 {
        margin-top: 0;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Bröllop</h1>
      <h2>Välkommen till vår bröllopswebbplats</h2>
      <p>HejHej</p>
    </header>
    <main>
      <section class="hero">
        <h2>Our Story</h2>
        <p>Join us for a beautiful day of love, laughter, and celebration. </p>
        <h3>Event Details</h3>
        <p>Date: Saturday, [Date]</p>
        <p>Location: [Venue Name]</p>
      </section>
    </main>
  </body>
</html>
